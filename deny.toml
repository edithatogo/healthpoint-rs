[licenses]
allow = [
  "Apache-2.0",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CDLA-Permissive-2.0",
  "ISC",
  "Unicode-3.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "warn"

[advisories]
unmaintained = "workspace"
unsound = "workspace"
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-git = []
