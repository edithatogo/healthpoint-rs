# Machine-readable default access posture for healthpoint-rs.
# This remains conservative even after portal terms review.

schema_version = "healthpoint.access-policy.v1"
source_name = "Healthpoint API"
access_mode = "bring-your-own-key"
redistribution_status = "prohibited-without-written-approval"
default_export_policy = "local-only"
public_cache_allowed = false
public_proxy_allowed = false
scraping_allowed = false
bulk_dump_enabled_by_default = false
real_payload_fixtures_allowed = false
production_use_allowed_without_written_approval = "only for Dylan Mordaunt/VUW permitted academic non-commercial research under the executed API and Data Licence Agreement"
commercial_use_allowed_without_written_approval = false
competing_directory_allowed = false
ai_training_dataset_allowed = false
attribution_required = true
approved_environment = "sandbox/UAT plus production access only within the executed licence permitted purpose"
permitted_purpose = "academic, non-commercial research into causal effects of health system reforms and geographic distribution/access to care"
directory_scope = "Community Pharmacy, General Practitioners, and Health Services national service information"
production_daily_call_limit = 100000
production_requests_per_second_limit = 350
uat_daily_quota_observed = 100000
uat_rate_observed = 10
contract_evidence_dir = ".healthpoint/contracts/outlook"

[review]
terms_reviewed = true
reviewed_at = "2026-06-30"
reviewer = "Codex with Dylan Mordaunt portal access"
contract_retrieved_from = "VUW Outlook via Microsoft Graph device-code auth"
notes = "The local ignored contract evidence contains the June 2026 Healthpoint API and Data Licence variation. The executed licence permits Dylan Mordaunt/VUW academic non-commercial research within the stated purpose and directory scope, requires Healthpoint attribution for publications using API data, specifies production API limits, and prohibits use outside the permitted purpose, competing directory/database products, unauthorised third-party availability, systematic extraction/reproduction, and AI/model-training dataset use. Public repo release remains code-only/BYO-key; Healthpoint-derived datasets, public caches, proxies, and open_social_data publication remain blocked without written approval."
