name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  metadata:
    name: Metadata preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Metadata-only static preflight
        run: scripts/static-preflight.py
      - name: Generate interim contract schemas
        run: scripts/generate-contract-schemas.py
      - name: Ensure generated schemas are committed
        run: git diff --exit-code -- contracts/schemas
      - name: Whitespace diff check
        run: git diff --check

  rust:
    name: Rust workspace (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Check
        run: cargo check --workspace --all-targets --locked
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Test
        run: cargo test --workspace --locked

  msrv:
    name: MSRV check
    runs-on: ubuntu-latest
    needs: metadata
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - name: Check MSRV
        run: cargo check --workspace --all-targets --locked

  deny:
    name: Supply-chain policy
    runs-on: ubuntu-latest
    needs: [rust, msrv]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
