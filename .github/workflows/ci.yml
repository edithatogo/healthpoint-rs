name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  metadata:
    name: Metadata preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Metadata-only static preflight
        run: scripts/static-preflight.py
      - name: Generate interim contract schemas
        run: scripts/generate-contract-schemas.py
      - name: Ensure generated schemas are committed
        run: git diff --exit-code -- contracts/schemas
      - name: Whitespace diff check
        run: git diff --check

  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    needs: metadata
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Check
        run: cargo check --workspace --all-targets
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  deny:
    name: Supply-chain policy
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
