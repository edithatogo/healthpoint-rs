name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_crates:
        description: "Publish crates to crates.io"
        type: boolean
        default: false
      create_github_release:
        description: "Create/update GitHub release"
        type: boolean
        default: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  validate:
    name: Validate release inputs
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Resolve version
        id: version
        shell: bash
        run: |
          version=$(python3 - <<'PY'
          import tomllib
          print(tomllib.load(open('Cargo.toml','rb'))['workspace']['package']['version'])
          PY
          )
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
      - name: Validate tag/version consistency
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            scripts/check-release-version.py --tag "${GITHUB_REF_NAME}"
          else
            scripts/check-release-version.py
          fi
      - name: Validate MCP registry readiness
        run: scripts/check-mcp-registry-submission.py
      - name: Cargo package validation
        run: |
          cargo publish -p healthpoint-core --dry-run --locked
          for crate in healthpoint-fhir healthpoint-client healthpoint-export healthpoint-testkit healthpoint-osd-adapter healthpoint-cli healthpoint-mcp; do
            cargo package -p "$crate" --locked --list >/dev/null
          done

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build release binaries
        run: cargo build --release --locked --target ${{ matrix.target }} -p healthpoint-cli -p healthpoint-mcp
      - name: Stage Unix artifacts
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist/healthpoint-rs-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/healthpoint dist/healthpoint-rs-${{ matrix.target }}/
          cp target/${{ matrix.target }}/release/healthpoint-mcp dist/healthpoint-rs-${{ matrix.target }}/
          cp README.md LICENSE server.json dist/healthpoint-rs-${{ matrix.target }}/
          tar -C dist -czf healthpoint-rs-${{ matrix.target }}.tar.gz healthpoint-rs-${{ matrix.target }}
          shasum -a 256 healthpoint-rs-${{ matrix.target }}.tar.gz > healthpoint-rs-${{ matrix.target }}.tar.gz.sha256
      - name: Stage Windows artifacts
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/healthpoint-rs-${{ matrix.target }}
          Copy-Item target/${{ matrix.target }}/release/healthpoint.exe dist/healthpoint-rs-${{ matrix.target }}/
          Copy-Item target/${{ matrix.target }}/release/healthpoint-mcp.exe dist/healthpoint-rs-${{ matrix.target }}/
          Copy-Item README.md, LICENSE, server.json dist/healthpoint-rs-${{ matrix.target }}/
          Compress-Archive -Path dist/healthpoint-rs-${{ matrix.target }} -DestinationPath healthpoint-rs-${{ matrix.target }}.zip
          Get-FileHash healthpoint-rs-${{ matrix.target }}.zip -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  healthpoint-rs-${{ matrix.target }}.zip" } | Set-Content healthpoint-rs-${{ matrix.target }}.zip.sha256
      - uses: actions/upload-artifact@v7
        with:
          name: healthpoint-rs-${{ matrix.target }}
          path: |
            healthpoint-rs-${{ matrix.target }}.${{ matrix.archive }}
            healthpoint-rs-${{ matrix.target }}.${{ matrix.archive }}.sha256

  publish-crates:
    name: Publish crates.io packages
    runs-on: ubuntu-latest
    needs: [validate, build]
    if: github.ref_type == 'tag' || inputs.publish_crates == true
    environment: crates-io
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CARGO_REGISTRY_TOKEN}" ]]; then
            if [[ "${{ inputs.publish_crates }}" == "true" ]]; then
              echo "CARGO_REGISTRY_TOKEN is required when publish_crates=true" >&2
              exit 1
            fi
            echo "CARGO_REGISTRY_TOKEN is not configured; skipping crates.io publication for this release."
            exit 0
          fi
          publish_crate() {
            local crate="$1"
            for attempt in 1 2 3 4 5; do
              if cargo publish -p "$crate" --locked; then
                return 0
              fi
              sleep $((attempt * 20))
            done
            return 1
          }
          publish_crate healthpoint-core
          publish_crate healthpoint-fhir
          publish_crate healthpoint-client
          publish_crate healthpoint-export
          publish_crate healthpoint-testkit
          publish_crate healthpoint-osd-adapter
          publish_crate healthpoint-cli
          publish_crate healthpoint-mcp

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [validate, build]
    if: github.ref_type == 'tag' || inputs.create_github_release == true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v6
        with:
          path: dist-artifacts
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            tag="${{ needs.validate.outputs.tag }}"
          fi
          notes_file=$(mktemp)
          awk '/^## v?${{ needs.validate.outputs.version }} /{flag=1; next} /^## /{if(flag) exit} flag{print}' CHANGELOG.md > "$notes_file"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --target "$GITHUB_SHA" --title "$tag" --notes-file "$notes_file"
          find dist-artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) -print0 | xargs -0 gh release upload "$tag" --clobber
