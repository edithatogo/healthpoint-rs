name: MCP registry submission readiness

on:
  workflow_dispatch:
    inputs:
      submit_official:
        description: "Submit to the official MCP registry when credentials/tooling are available"
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    name: Validate registry requirements
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Validate local registry requirements
        run: scripts/check-mcp-registry-submission.py
      - name: Check crates.io publication status
        shell: bash
        run: |
          version=$(python3 - <<'PY'
          import tomllib
          print(tomllib.load(open('Cargo.toml','rb'))['workspace']['package']['version'])
          PY
          )
          missing=0
          for crate in healthpoint-core healthpoint-fhir healthpoint-client healthpoint-export healthpoint-testkit healthpoint-osd-adapter healthpoint-cli healthpoint-mcp; do
            if cargo search "$crate" --limit 1 | grep "^$crate = \"$version\""; then
              echo "published: $crate $version"
            else
              echo "not-yet-published: $crate $version"
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 && "${{ inputs.submit_official }}" == "true" ]]; then
            echo "All crates must be published before official MCP registry submission." >&2
            exit 1
          fi
      - name: Official registry submit gate
        if: inputs.submit_official == true
        shell: bash
        run: |
          command -v mcp-publisher
          mcp-publisher publish --dry-run
          mcp-publisher publish
